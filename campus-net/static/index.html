<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校内网 - 老校园社交</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="top-bar">
    <div class="logo">校内网</div>
    <div class="identity-switch">
      <div class="user-switch">
        <span>用户：</span>
        <select id="userSelect"></select>
      </div>
      <div class="role-switch">
        <span>角色：</span>
        <select id="roleSelect">
          <option value="student">普通学生</option>
          <option value="author">动态作者</option>
          <option value="admin">管理员</option>
        </select>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- 左侧：当前用户 + 统计 + 分组 + 同学/好友 -->
    <aside class="sidebar-left">
      <section class="current-user-panel" id="currentUserPanel">
        <div class="cu-avatar-wrap">
          <img class="cu-avatar" id="cuAvatar" src="" alt="" onerror="this.style.display='none'">
        </div>
        <div class="cu-info">
          <div class="cu-name" id="cuName">--</div>
          <div class="cu-role" id="cuRole">--</div>
        </div>
      </section>

      <section class="permissions-panel" id="permissionsPanel">
        <h3>权限说明</h3>
        <div id="permissionsBody"></div>
      </section>

      <section class="stats-panel">
        <h3>数据统计</h3>
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-value" id="statPostCount">0</span>
            <span class="stat-label">动态总数</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="statFriendCount">0</span>
            <span class="stat-label">好友数</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="statPendingCount">0</span>
            <span class="stat-label">待处理申请</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="statVisibleCount">0</span>
            <span class="stat-label">可见动态</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="statCommentCount">0</span>
            <span class="stat-label">评论总数</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="statMyVisibleCount">0</span>
            <span class="stat-label">我的可见动态</span>
          </div>
        </div>
      </section>

      <section class="groups-panel">
        <h3>好友分组</h3>
        <div id="groupsList"></div>
      </section>

      <section class="friends-panel">
        <h3>同学 / 好友</h3>
        <div id="classmatesList"></div>
      </section>
    </aside>

    <!-- 中间：动态列表 -->
    <main class="feed-main">
      <!-- 发布入口 -->
      <section class="publish-panel">
        <h3>发布新动态</h3>
        <textarea id="publishContent" placeholder="说点什么吧..." rows="2"></textarea>
        <input type="text" id="publishPhoto" placeholder="照片URL（可选，留空自动生成）">
        <div class="publish-row">
          <select id="publishVisibility">
            <option value="public">公开</option>
            <option value="friends">仅好友</option>
            <option value="group">指定分组</option>
            <option value="self">仅自己</option>
          </select>
          <select id="publishVisibleGroup" style="display:none;">
            <option value="classmate">同班同学</option>
            <option value="roommate">室友</option>
          </select>
          <button id="publishBtn">发布</button>
        </div>
      </section>

      <!-- 动态列表 -->
      <section class="feed-list" id="feedList">
        <p class="loading">加载中...</p>
      </section>
    </main>
  </div>

  <!-- 动态详情弹窗 -->
  <div class="modal-overlay" id="detailModal" style="display:none;">
    <div class="modal-content">
      <button class="modal-close" id="modalCloseBtn">&times;</button>
      <div id="detailBody"></div>
    </div>
  </div>

  <!-- 身份选择弹窗 -->
  <div class="modal-overlay" id="identityModal" style="display:none;">
    <div class="modal-content identity-modal-content">
      <h3>请选择你的身份</h3>
      <p class="identity-hint">当前身份信息缺失，请选择一个用户和角色后继续使用</p>
      <div class="identity-select-group">
        <label>用户：</label>
        <select id="identityUserSelect"></select>
      </div>
      <div class="identity-select-group">
        <label>角色：</label>
        <select id="identityRoleSelect">
          <option value="student">普通学生</option>
          <option value="author">动态作者</option>
          <option value="admin">管理员</option>
        </select>
      </div>
      <button class="identity-confirm-btn" id="identityConfirmBtn">确认并进入</button>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
